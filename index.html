<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Game Statistics</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:#fff;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:15px;
    overflow:hidden;
}

.game-img{
    height:180px;
    overflow:hidden;
}

.game-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.provider{
    color:#fbbf24;
    font-size:14px;
}

.game-name{
    font-size:20px;
    font-weight:bold;
    margin:8px 0;
}

.rtp{
    margin-bottom:10px;
}

.bar{
    height:10px;
    background:#374151;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#22c55e;
}

.stats{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}
</style>
</head>
<body>

<h1>Live Game Statistics</h1>

<div class="grid">

    <div class="card">
        <div class="game-img">
            <img src="https://picsum.photos/400/250" alt="Game">
        </div>
        <div class="card-body">
            <div class="provider">Provider A</div>
            <div class="game-name">Sample Game</div>
            <div class="rtp">Performance: 98.4%</div>

            <div class="bar">
                <div class="fill" style="width:98.4%"></div>
            </div>

            <div class="stats">
                <span>Trending</span>
                <span>Rank #1</span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
